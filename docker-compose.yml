version: '3.8'

services:
  teamai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamai-app
    ports:
      - "${PORT:-8001}:8001"
    volumes:
      # Use local data directory (contains existing meetings)
      - ./data:/app/data
      # Mount frontend for development (optional - remove in production)
      # - ./frontend:/app/frontend:ro
    environment:
      # K2 API Configuration (required) - using build-api-1 which is currently working
      - K2_API_KEY=${K2_API_KEY}
      - K2_THINK_BASE_URL=${K2_THINK_BASE_URL:-http://build-api-1.ifmapp.net:8000}
      - K2_INSTRUCT_BASE_URL=${K2_INSTRUCT_BASE_URL:-http://build-api-1.ifmapp.net:8000}
      - K2_THINK_MODEL=${K2_THINK_MODEL:-LLM360/K2-Think-V2}
      - K2_INSTRUCT_MODEL=${K2_INSTRUCT_MODEL:-LLM360/K2-Think-V2}

      # Notion Integration (required for task sync)
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}

      # Email Configuration (optional - for notifications)
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - TEAMAI_EMAIL=${TEAMAI_EMAIL}
      - TEAMAI_EMAIL_PASSWORD=${TEAMAI_EMAIL_PASSWORD}
      - IMAP_SERVER=${IMAP_SERVER:-imap.gmail.com}
      - EMAIL_POLLING_INTERVAL=${EMAIL_POLLING_INTERVAL:-30}

      # Telegram (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}

      # OpenClaw (optional)
      - USE_OPENCLAW=${USE_OPENCLAW:-false}
      - OPENCLAW_BASE_URL=${OPENCLAW_BASE_URL:-http://localhost:18789}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}

      # Database paths (inside container)
      - DB_PATH=/app/data/teamai.db
      - CHROMA_PATH=/app/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/openclaw/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - teamai-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: teamai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - teamai
    restart: unless-stopped
    networks:
      - teamai-network
    profiles:
      - production

volumes:
  teamai-data:
    driver: local

networks:
  teamai-network:
    driver: bridge
